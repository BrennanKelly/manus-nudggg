name: Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build Vite app
        run: npm run build
        env:
          NODE_ENV: production
      
      - name: Verify build output
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📦 Build Verification"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "Build output directory contents:"
          ls -lah dist/public/
          echo ""
          echo "Checking for index.html..."
          if [ ! -f "dist/public/index.html" ]; then
            echo "❌ FATAL ERROR: dist/public/index.html not found!"
            echo "Build failed or Vite config is incorrect"
            exit 1
          fi
          echo "✅ dist/public/index.html exists"
          echo ""
          echo "Files that will be deployed to /public_html:"
          cd dist/public && find . -maxdepth 2 -type f | head -20
      
      - name: Deploy to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          local-dir: ./dist/public/
          server-dir: /public_html/
          dangerous-clean-slate: true
          exclude: |
            **/.git*
            **/.git*/**
            **/.gitkeep
            **/node_modules/**
            **/.DS_Store
      
      - name: Deployment Summary
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ Deployment Complete"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "📤 Deployed: dist/public/* → /public_html/"
          echo ""
          echo "Expected structure on Hostinger:"
          echo "  /public_html/"
          echo "  ├── index.html       ← Your homepage"
          echo "  ├── assets/"
          echo "  │   ├── index-*.js"
          echo "  │   └── index-*.css"
          echo "  ├── .htaccess"
          echo "  └── favicon.ico"
          echo ""
          echo "🌐 Visit your domain to verify"
          echo ""
          echo "If you see 403, run 'Fix Ownership' in Hostinger:"
          echo "  → hPanel → Files → File Manager"
          echo "  → Right-click public_html → Fix Ownership"
          echo ""
