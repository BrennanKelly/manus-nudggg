<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Nudggg – Build Better Habits, Track Goals & Grow Every Day</title>
    <meta name="description" content="Nudggg helps you build lasting habits, track personal goals, journal your progress, and stay on course with gentle nudges. Free to start." />
    <meta name="keywords" content="habit tracker, goal setting, personal growth, journaling, daily habits, productivity, self improvement" />
    <meta name="author" content="Nudggg" />

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Nudggg – Build Better Habits & Track Your Goals" />
    <meta property="og:description" content="Build lasting habits, track goals, and journal your progress with gentle nudges that keep you on course." />
    <meta property="og:url" content="https://nudggg.com/" />
    <meta property="og:site_name" content="Nudggg" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Nudggg – Build Better Habits & Track Your Goals" />
    <meta name="twitter:description" content="Build lasting habits, track goals, and journal your progress with gentle nudges." />

    <!-- Canonical -->
    <link rel="canonical" href="https://nudggg.com/" />

    <link rel="icon" type="image/x-icon" href="/favicon.ico" />

    <!-- Google Fonts - Friendly, readable typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Crimson+Pro:wght@400;600&display=swap" rel="stylesheet" />

    <style>
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      h1, h2, h3, h4, h5, h6 {
        font-family: 'Crimson Pro', Georgia, serif;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Analytics: only loads when VITE_ANALYTICS_ENDPOINT is configured -->
    <script>
      (function() {
        var endpoint = "%VITE_ANALYTICS_ENDPOINT%";
        var websiteId = "%VITE_ANALYTICS_WEBSITE_ID%";
        if (endpoint && !endpoint.includes("VITE_ANALYTICS") && websiteId && !websiteId.includes("VITE_ANALYTICS")) {
          var s = document.createElement("script");
          s.defer = true;
          s.src = endpoint + "/umami";
          s.setAttribute("data-website-id", websiteId);
          document.head.appendChild(s);
        }
      })();
    </script>
  </body>

</html>
